<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate KARTAVYA PPTX</title>
  <!-- Load JSZip and PptxGenJS from CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      text-align: center;
      border: 1px solid #334155;
      max-width: 450px;
    }
    h1 {
      color: #ff9933;
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .btn {
      background: linear-gradient(135deg, #ff9933 0%, #ff6600 100%);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 0.75rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 102, 0, 0.4);
    }
    .status {
      margin-top: 1.5rem;
      color: #10b981;
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>KARTAVYA PPTX Generator</h1>
    <p>Click the button below to download the premium presentation slide-deck containing real project screenshots.</p>
    <button class="btn" onclick="generatePPTX()">Download PPTX with Screenshots</button>
    <div id="status" class="status">✓ Presentation generated with screenshots! Downloading...</div>
  </div>

  <script>
    function generatePPTX() {
      let pptx = new PptxGenJS();
      pptx.layout = 'LAYOUT_16x9';

      // Define Color Palette
      const colors = {
        bgDark: '0F172A',      // Slate 900
        cardBg: '1E293B',      // Slate 800
        cardBorder: '334155',  // Slate 700
        orange: 'F97316',      // Premium Orange
        navy: '0F2942',        // Deep Navy
        textLight: 'F8FAFC',   // Off-white
        textMuted: '94A3B8',   // Cool gray
        accentBlue: '3B82F6',  // Tech Blue
        accentGreen: '10B981'  // Emerald Green
      };

      // Helper function to add a standard premium slide
      function addPremiumSlide(titleText, categoryText) {
        let slide = pptx.addSlide();
        slide.background = { fill: colors.bgDark };

        // Top Orange Highlight Bar
        slide.addShape(pptx.ShapeType.rect, {
          x: 0, y: 0, w: '100%', h: 0.15, fill: { color: colors.orange }
        });

        // Category Tag
        if (categoryText) {
          slide.addText(categoryText.toUpperCase(), {
            x: 0.8, y: 0.4, w: 10, h: 0.3,
            fontSize: 10, fontFace: 'Segoe UI',
            bold: true, color: colors.accentBlue,
            letterSpacing: 2
          });
        }

        // Main Header Title
        slide.addText(titleText, {
          x: 0.8, y: 0.6, w: 11, h: 0.6,
          fontSize: 28, fontFace: 'Trebuchet MS',
          bold: true, color: colors.textLight
        });

        // Bottom Footer
        slide.addText("KARTAVYA Smart System", {
          x: 0.8, y: 7.0, w: 5, h: 0.3,
          fontSize: 10, fontFace: 'Segoe UI', color: colors.textMuted
        });

        return slide;
      }

      // ----------------------------------------------------
      // SLIDE 1: Cover Slide
      // ----------------------------------------------------
      let s1 = pptx.addSlide();
      s1.background = { fill: colors.navy };

      s1.addShape(pptx.ShapeType.rtTriangle, {
        x: 6.5, y: 0, w: 6.8, h: 7.5,
        fill: { color: '001229' },
        flipH: true
      });

      s1.addShape(pptx.ShapeType.rect, {
        x: 0, y: 0, w: '100%', h: 0.2, fill: { color: colors.orange }
      });

      // Cover Badge Icon
      s1.addShape(pptx.ShapeType.hexagon, {
        x: 1.0, y: 1.2, w: 1.2, h: 1.2,
        fill: { color: colors.orange },
        line: { color: colors.textLight, width: 2 }
      });
      s1.addText("K", {
        x: 1.0, y: 1.2, w: 1.2, h: 1.2,
        fontSize: 36, fontFace: 'Trebuchet MS', bold: true, color: colors.textLight, align: 'center', valign: 'middle'
      });

      s1.addText("KARTAVYA", {
        x: 1.0, y: 2.8, w: 10, h: 1.0,
        fontSize: 60, fontFace: 'Trebuchet MS', bold: true, color: colors.textLight,
        letterSpacing: 2
      });

      s1.addText("Next-Generation Smart Police Management & Duty Allocation System", {
        x: 1.0, y: 3.8, w: 8.5, h: 0.8,
        fontSize: 20, fontFace: 'Segoe UI', color: colors.orange,
        bold: true
      });

      s1.addShape(pptx.ShapeType.line, {
        x: 1.0, y: 4.8, w: 4.5, h: 0,
        line: { color: colors.orange, width: 2 }
      });

      s1.addText("Uttar Pradesh Police Station Automation\nDeployment & Features Showcase", {
        x: 1.0, y: 5.2, w: 8, h: 0.8,
        fontSize: 13, fontFace: 'Segoe UI', color: colors.textMuted,
        lineSpacing: 18
      });


      // ----------------------------------------------------
      // SLIDE 2: Core Vision & Problems Solved
      // ----------------------------------------------------
      let s2 = addPremiumSlide("Modernizing Station Operations", "System Vision");
      
      // Card 1
      s2.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 3.6, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s2.addText("Manual Roster Delays", { x: 1.1, y: 2.1, w: 3.0, h: 0.5, fontSize: 18, bold: true, color: colors.orange });
      s2.addText("Traditional paper rosters took hours to configure and caused communication delays among officers.", { x: 1.1, y: 2.8, w: 3.0, h: 1.5, fontSize: 13, color: colors.textLight });
      s2.addText("❌ OLD WAY", { x: 1.1, y: 5.5, w: 3.0, h: 0.4, fontSize: 12, bold: true, color: 'EF4444' });

      // Card 2
      s2.addShape(pptx.ShapeType.roundRect, { x: 4.8, y: 1.8, w: 3.6, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s2.addText("Real-Time Allocation", { x: 5.1, y: 2.1, w: 3.0, h: 0.5, fontSize: 18, bold: true, color: colors.accentBlue });
      s2.addText("KARTAVYA automates duty allocation, generating dynamic rosters instantaneously with local access.", { x: 5.1, y: 2.8, w: 3.0, h: 1.5, fontSize: 13, color: colors.textLight });
      s2.addText("⚡ NEW WAY", { x: 5.1, y: 5.5, w: 3.0, h: 0.4, fontSize: 12, bold: true, color: colors.accentGreen });

      // Card 3
      s2.addShape(pptx.ShapeType.roundRect, { x: 8.8, y: 1.8, w: 3.6, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s2.addText("Resource Mismatch", { x: 9.1, y: 2.1, w: 3.0, h: 0.5, fontSize: 18, bold: true, color: colors.orange });
      s2.addText("Forces were deployed without accurate tracking of weapons, vehicles, and active personnel availability.", { x: 9.1, y: 2.8, w: 3.0, h: 1.5, fontSize: 13, color: colors.textLight });
      s2.addText("⚠️ SOLVED", { x: 9.1, y: 5.5, w: 3.0, h: 0.4, fontSize: 12, bold: true, color: 'F59E0B' });


      // ----------------------------------------------------
      // SLIDE 3: Role-Based Dashboard (with Actual Screenshot)
      // ----------------------------------------------------
      let s3 = addPremiumSlide("Two-Way Access Control Layout", "Roles & Authorization");

      // Left Info Block
      s3.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s3.addText("SHO / ADMIN INTERFACE", { x: 1.1, y: 2.0, w: 4.2, h: 0.4, fontSize: 15, bold: true, color: colors.orange });
      s3.addText("✔ Deploy & edit dynamic force rosters\n✔ Monitor active weapons & PCR vans\n✔ Approve/deny pending leave requests", {
        x: 1.1, y: 2.4, w: 4.2, h: 1.2, fontSize: 12, color: colors.textLight, lineSpacing: 18
      });

      s3.addText("CONSTABLE / OFFICER INTERFACE", { x: 1.1, y: 3.8, w: 4.2, h: 0.4, fontSize: 15, bold: true, color: colors.accentBlue });
      s3.addText("✔ Check personalized 'My Duty Schedule'\n🚫 Protected pages: Wizard is blocked\n🚫 Management actions are hidden", {
        x: 1.1, y: 4.2, w: 4.2, h: 1.2, fontSize: 12, color: colors.textLight, lineSpacing: 18
      });

      // Right: Actual Dashboard Screenshot
      s3.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s3.addImage({
        path: './screenshots/media__1782810618555.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 4: Interactive Duty Wizard (with Actual Screenshot)
      // ----------------------------------------------------
      let s4 = addPremiumSlide("Duty Management & Dynamic Wizard", "Duty Assignment");

      s4.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s4.addText("Interactive 3-Step Wizard Flow", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      
      s4.addText("• Step 1: Input core parameters (Duty title, location, Date, Severity level).\n" +
                "• Step 2: AI Suggestion displays suggested staff strength and weapons requirement.\n" +
                "• Step 3: Custom Assignment allows live selection of Team Leader, custom force count, PCR vehicles, and specialized weapons/gear.", {
        x: 1.1, y: 2.7, w: 4.2, h: 3.2, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      // Right: Actual Wizard Screenshot
      s4.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s4.addImage({
        path: './screenshots/media__1782808480499.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 5: Excel Bulk Import & Verification (with Actual Screenshot)
      // ----------------------------------------------------
      let s5 = addPremiumSlide("Excel Import & PNO Validation", "Roster Management");

      s5.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s5.addText("Excel Bulk Upload & Checking", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      
      s5.addText("• Spreadsheet Mapping: Upload Name, Rank, PNO Number, and Mobile variables directly.\n" +
                "• Security scan: System validates PNOs (Belt numbers) to block duplicates in Excel or active roster.\n" +
                "• Instant Logs: Displays precise row numbers where validation checks fail.", {
        x: 1.1, y: 2.7, w: 4.2, h: 3.2, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      // Right: Actual Officer Database/Excel Upload Screenshot
      s5.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s5.addImage({
        path: './screenshots/media__1782807764515.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 6: UI Design & Theme System
      // ----------------------------------------------------
      let s6 = addPremiumSlide("Premium Glassmorphism Interface", "Aesthetic Design");
      
      s6.addText("Designed to look state-of-the-art while maintaining robust visibility.", {
        x: 0.8, y: 1.5, w: 5.0, h: 0.8, fontSize: 16, color: colors.textMuted, fontFace: 'Segoe UI'
      });

      s6.addText("• Dark Navy Base (#001229):\n  Reduces eye fatigue during high-stress night shifts.\n" +
                "• Frosted Glass Panels:\n  Combines sleek translucent backdrops with thin border highlights.\n" +
                "• Glowing Accents:\n  Leverages bright orange borders to signal active alerts and updates.", {
        x: 0.8, y: 2.5, w: 5.0, h: 4.0, fontSize: 14, color: colors.textLight, lineSpacing: 24
      });

      // Right: UI Styling Preview Image
      s6.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s6.addImage({
        path: './screenshots/media__1782808333613.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 7: DevOps and Automated Delivery
      // ----------------------------------------------------
      let s7 = addPremiumSlide("Automated Delivery Pipeline", "DevOps & Hosting");

      s7.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 5.4, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s7.addText("GitHub Pages & Actions", { x: 1.1, y: 2.1, w: 4.8, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s7.addText("✔ Integrated CI/CD via GitHub workflows\n" +
                "✔ Pushing code automatically triggers site compilation\n" +
                "✔ Vite build outputs deploy to live GitHub Pages hosting\n" +
                "✔ Fast load times optimized using Rollup chunking", {
        x: 1.1, y: 2.7, w: 4.8, h: 3.2, fontSize: 14, color: colors.textLight, lineSpacing: 28
      });

      s7.addShape(pptx.ShapeType.roundRect, { x: 7.0, y: 1.8, w: 5.4, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s7.addText("Strict Pre-Build Checks", { x: 7.3, y: 2.1, w: 4.8, h: 0.4, fontSize: 18, bold: true, color: colors.accentBlue });
      s7.addText("✔ Full compile checks locally and on cloud\n" +
                "✔ TypeScript validates variables & component properties\n" +
                "✔ Vite HMR gives real-time local environment feedback\n" +
                "✔ Zero runtime crashes thanks to linting rules", {
        x: 7.3, y: 2.7, w: 4.8, h: 3.2, fontSize: 14, color: colors.textLight, lineSpacing: 28
      });


      // ----------------------------------------------------
      // SLIDE 8: Summary / Thank You Slide
      // ----------------------------------------------------
      let s8 = pptx.addSlide();
      s8.background = { fill: colors.navy };
      
      s8.addShape(pptx.ShapeType.rect, {
        x: 0, y: 0, w: '100%', h: 0.25, fill: { color: colors.orange }
      });

      s8.addText("KARTAVYA SMART SYSTEM", {
        x: 1.0, y: 1.8, w: 10, h: 0.5,
        fontSize: 16, fontFace: 'Segoe UI', bold: true, color: colors.orange,
        letterSpacing: 2
      });

      s8.addText("Digitalizing Lucknow police duties with security and modern designs.", {
        x: 1.0, y: 2.5, w: 11, h: 1.0,
        fontSize: 32, fontFace: 'Trebuchet MS', bold: true, color: colors.textLight
      });

      s8.addText("Thank You!", {
        x: 1.0, y: 4.2, w: 5, h: 1.0,
        fontSize: 54, fontFace: 'Trebuchet MS', bold: true, color: colors.orange
      });

      // Save Presentation
      pptx.writeFile({ fileName: 'KARTAVYA_Project_Presentation.pptx' })
        .then(() => {
          document.getElementById('status').style.display = 'block';
        })
        .catch(err => {
          alert('Error generating PPTX: ' + err);
        });
    }
  </script>
</body>
</html>
