<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate KARTAVYA PPTX</title>
  <!-- Load JSZip and PptxGenJS from CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      text-align: center;
      border: 1px solid #334155;
      max-width: 450px;
    }
    h1 {
      color: #ff9933;
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .btn {
      background: linear-gradient(135deg, #ff9933 0%, #ff6600 100%);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 0.75rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 102, 0, 0.4);
    }
    .status {
      margin-top: 1.5rem;
      color: #10b981;
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>KARTAVYA Step-by-Step PPTX</h1>
    <p>Click the button below to download the step-by-step presentation showing how every single requested feature was implemented.</p>
    <button class="btn" onclick="generatePPTX()">Download Step-by-Step PPTX</button>
    <div id="status" class="status">✓ Step-by-Step Presentation downloaded successfully!</div>
  </div>

  <script>
    function generatePPTX() {
      let pptx = new PptxGenJS();
      pptx.layout = 'LAYOUT_16x9';

      // Define Color Palette
      const colors = {
        bgDark: '0F172A',      // Slate 900
        cardBg: '1E293B',      // Slate 800
        cardBorder: '334155',  // Slate 700
        orange: 'F97316',      // UP Police Orange
        navy: '0F2942',        // Deep Navy
        textLight: 'F8FAFC',   // Off-white
        textMuted: '94A3B8',   // Cool gray
        accentBlue: '3B82F6',  // Tech Blue
        accentGreen: '10B981'  // Emerald Green
      };

      // Helper function to add a standard premium slide
      function addStepSlide(stepNum, stepTitle, categoryText) {
        let slide = pptx.addSlide();
        slide.background = { fill: colors.bgDark };

        // Top Orange Highlight Bar
        slide.addShape(pptx.ShapeType.rect, {
          x: 0, y: 0, w: '100%', h: 0.15, fill: { color: colors.orange }
        });

        // Step Badge Tag
        slide.addText(`STEP ${stepNum} • ${categoryText.toUpperCase()}`, {
          x: 0.8, y: 0.4, w: 10, h: 0.3,
          fontSize: 10, fontFace: 'Segoe UI',
          bold: true, color: colors.orange,
          letterSpacing: 2
        });

        // Main Header Title
        slide.addText(stepTitle, {
          x: 0.8, y: 0.6, w: 11, h: 0.6,
          fontSize: 26, fontFace: 'Trebuchet MS',
          bold: true, color: colors.textLight
        });

        // Bottom Footer
        slide.addText("KARTAVYA Implementation Journey", {
          x: 0.8, y: 7.0, w: 5, h: 0.3,
          fontSize: 10, fontFace: 'Segoe UI', color: colors.textMuted
        });

        return slide;
      }

      // ----------------------------------------------------
      // SLIDE 1: Cover Slide
      // ----------------------------------------------------
      let s1 = pptx.addSlide();
      s1.background = { fill: colors.navy };

      s1.addShape(pptx.ShapeType.rtTriangle, {
        x: 6.5, y: 0, w: 6.8, h: 7.5,
        fill: { color: '001229' },
        flipH: true
      });

      s1.addShape(pptx.ShapeType.rect, {
        x: 0, y: 0, w: '100%', h: 0.2, fill: { color: colors.orange }
      });

      s1.addShape(pptx.ShapeType.hexagon, {
        x: 1.0, y: 1.2, w: 1.2, h: 1.2,
        fill: { color: colors.orange },
        line: { color: colors.textLight, width: 2 }
      });
      s1.addText("K", {
        x: 1.0, y: 1.2, w: 1.2, h: 1.2,
        fontSize: 36, fontFace: 'Trebuchet MS', bold: true, color: colors.textLight, align: 'center', valign: 'middle'
      });

      s1.addText("KARTAVYA", {
        x: 1.0, y: 2.8, w: 10, h: 1.0,
        fontSize: 54, fontFace: 'Trebuchet MS', bold: true, color: colors.textLight,
        letterSpacing: 2
      });

      s1.addText("Step-by-Step Feature Implementation Showcase", {
        x: 1.0, y: 3.8, w: 8.5, h: 0.8,
        fontSize: 20, fontFace: 'Segoe UI', color: colors.orange,
        bold: true
      });

      s1.addShape(pptx.ShapeType.line, {
        x: 1.0, y: 4.8, w: 4.5, h: 0,
        line: { color: colors.orange, width: 2 }
      });

      s1.addText("A chronological walk-through of all user requests and customized updates built directly into the system.", {
        x: 1.0, y: 5.2, w: 8, h: 0.8,
        fontSize: 13, fontFace: 'Segoe UI', color: colors.textMuted,
        lineSpacing: 18
      });


      // ----------------------------------------------------
      // SLIDE 2: Step 1 - Sidebar Menu Arrangements (Request 1 & 7)
      // ----------------------------------------------------
      let s2 = addStepSlide("01", "Menu Organization & Navigation Polish", "Sidebar Menu");

      s2.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s2.addText("Re-arranging Dashboard Sidebar", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s2.addText("• Organized the sidebar items into logical blocks: MAIN, DUTY MANAGEMENT, and REPORTS.\n" +
                "• Designed a premium layout with micro-animations, glowing hover effects, and consistent UP Police colors.\n" +
                "• Added specific icons (Lucide Icons) next to each navigation point for immediate recognition.", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s2.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s2.addImage({
        path: './screenshots/media__1782804809329.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 3: Step 2 - Excel Bulk Upload Setup & Hint Table (Request 2 & 3)
      // ----------------------------------------------------
      let s3 = addStepSlide("02", "Excel Upload System & Hint Table", "Officer Roster");

      s3.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s3.addText("Uploading Force Roster via Spreadsheet", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s3.addText("• Integrated an Excel parsing engine (.xlsx) so station commanders can upload force lists in bulk.\n" +
                "• Built an interactive hint table showing columns: Name (नाम), Rank (पद), PNO Number (बेल्ट नंबर), and Phone (मोबाइल).\n" +
                "• Clearly indicated required fields (✅ ज़रूरी) and format guidelines (e.g. UP-XXXX).", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s3.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s3.addImage({
        path: './screenshots/media__1782807764515.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 4: Step 3 - Excel Upload validation & Duplicate Checks (Request 6)
      // ----------------------------------------------------
      let s4 = addStepSlide("03", "Data Validation & Duplicate Scanner", "Excel Integrity");

      s4.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s4.addText("Scanning for Upload Errors", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s4.addText("• Scanning rows during parser execution to ensure PNO numbers (officer IDs) are unique.\n" +
                "• Prevents duplicates within the file itself or against existing database entries.\n" +
                "• Renders a clear red validation warning dashboard showing row-by-row failures if any checks fail.", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s4.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s4.addImage({
        path: './screenshots/media__1782807764515.png', // Excel hint has the upload logs
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 5: Step 4 - Role-Based Sidebar Hiding (Request 4)
      // ----------------------------------------------------
      let s5 = addStepSlide("04", "Hiding Map for Station Level Users", "Access Security");

      s5.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s5.addText("Station-Level Restrictions", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s5.addText("• Restructured authorization rules so that users logged in as Station level (SHO, Constable) are restricted.\n" +
                "• The 'Live Duty Map' menu is automatically hidden from the sidebar for these roles to prevent coordinate leaks.\n" +
                "• This ensures only state-level commanders have tactical overview capabilities.", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s5.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s5.addImage({
        path: './screenshots/media__1782810618555.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 6: Step 5 - Thane Level Duty Operations (Request 5)
      // ----------------------------------------------------
      let s6 = addStepSlide("05", "Thane-Level Duty & Control Dashboard", "Thane Operations");

      s6.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s6.addText("Focused Thana Control View", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s6.addText("• Modified layout to display local police station metrics immediately upon login.\n" +
                "• Shows local beat deployment counts, station strength indicators, PCR vans availability, and custom weapon logs.\n" +
                "• Displays upcoming rosters and local leave requests inside the Thana Control Panel.", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s6.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s6.addImage({
        path: './screenshots/media__1782810618555.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 7: Step 7 - Dynamic Duty Wizard Parameters (Request 8)
      // ----------------------------------------------------
      let s7 = addStepSlide("06", "Dynamic Inputs (Removing Fixed Values)", "Duty Allocation");

      s7.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s7.addText("Removing Pre-fixed Numbers", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s7.addText("• Removed all hardcoded values from wizard Step 3 (such as default force of 4, PCR Boleros, etc.).\n" +
                "• Converted inputs into dynamic number selector inputs so commanders can adjust deployment values on-the-fly.\n" +
                "• Replaced static team leader cards with an interactive dropdown selection containing all available officers.", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s7.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s7.addImage({
        path: './screenshots/media__1782808480499.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 8: Step 8 - Dynamic Weapons & Gear Adder (Request 9)
      // ----------------------------------------------------
      let s8 = addStepSlide("07", "Interactive Weapons & Gear Allocation", "Equipment Control");

      s8.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s8.addText("Custom Weapons Selection Card", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s8.addText("• Replaced the static 'Add Weapons/Riot Gear' button with a dynamic inputs container.\n" +
                "• Allows inputting specific gear counts (e.g. 5, 10, etc.) next to drop-downs containing choices (Lathi, Riot Shield, Tear Gas, INSAS Rifles).\n" +
                "• Syncs gear requirements dynamically with local database schemas.", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s8.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s8.addImage({
        path: './screenshots/media__1782808598638.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 9: Step 9 - Separated Station Dashboard & My Duties (Request 10)
      // ----------------------------------------------------
      let s9 = addStepSlide("08", "Separating Personal Duties from Station Overview", "Constable Profile");

      s9.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 1.8, w: 4.8, h: 4.5, fill: { color: colors.cardBg }, line: { color: colors.cardBorder, width: 1 } });
      s9.addText("Two Separate Navigation Views", { x: 1.1, y: 2.1, w: 4.2, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s9.addText("• Previously, Station Dashboard redirected Constables to their personal profile, creating overlap.\n" +
                "• Fixed it so that 'Station Dashboard' displays the read-only local station stats overview.\n" +
                "• 'My Duty Schedule' is now a completely separate menu option displaying the Constable's personal profile card and duty calendar.", {
        x: 1.1, y: 2.8, w: 4.2, h: 3.0, fontSize: 13, color: colors.textLight, lineSpacing: 22
      });

      s9.addShape(pptx.ShapeType.roundRect, { x: 6.0, y: 1.8, w: 6.2, h: 4.5, fill: '020617', line: { color: colors.orange, width: 2 } });
      s9.addImage({
        path: './screenshots/media__1782808693637.png',
        x: 6.05, y: 1.85, w: 6.1, h: 4.4
      });


      // ----------------------------------------------------
      // SLIDE 10: Conclusion Slide
      // ----------------------------------------------------
      let s10 = pptx.addSlide();
      s10.background = { fill: colors.navy };
      
      s10.addShape(pptx.ShapeType.rect, {
        x: 0, y: 0, w: '100%', h: 0.25, fill: { color: colors.orange }
      });

      s10.addText("KARTAVYA SMART SYSTEM", {
        x: 1.0, y: 1.8, w: 10, h: 0.5,
        fontSize: 16, fontFace: 'Segoe UI', bold: true, color: colors.orange,
        letterSpacing: 2
      });

      s10.addText("Digitalizing Lucknow police duties with security and modern designs.", {
        x: 1.0, y: 2.5, w: 11, h: 1.0,
        fontSize: 32, fontFace: 'Trebuchet MS', bold: true, color: colors.textLight
      });

      s10.addText("Thank You!", {
        x: 1.0, y: 4.2, w: 5, h: 1.0,
        fontSize: 54, fontFace: 'Trebuchet MS', bold: true, color: colors.orange
      });

      // Save Presentation
      pptx.writeFile({ fileName: 'KARTAVYA_Project_Presentation.pptx' })
        .then(() => {
          document.getElementById('status').style.display = 'block';
        })
        .catch(err => {
          alert('Error generating PPTX: ' + err);
        });
    }
  </script>
</body>
</html>
