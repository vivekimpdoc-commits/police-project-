<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate KARTAVYA PPTX</title>
  <!-- Load JSZip and PptxGenJS from CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      text-align: center;
      border: 1px solid #334155;
      max-width: 450px;
    }
    h1 {
      color: #ff9933;
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .btn {
      background: linear-gradient(135deg, #ff9933 0%, #ff6600 100%);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 0.75rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 102, 0, 0.4);
    }
    .status {
      margin-top: 1.5rem;
      color: #10b981;
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>KARTAVYA PPTX Generator</h1>
    <p>Click the button below to generate and download a professional PowerPoint presentation highlighting the project achievements.</p>
    <button class="btn" onclick="generatePPTX()">Download PPTX Presentation</button>
    <div id="status" class="status">✓ Presentation generated and downloading!</div>
  </div>

  <script>
    function generatePPTX() {
      // 1. Create a new Presentation
      let pptx = new PptxGenJS();
      pptx.layout = 'LAYOUT_16x9';

      // Define color palette
      const colors = {
        navy: '002147',   // UP Police Navy Blue
        orange: 'FF9933', // Orange branding
        bgDark: '0F172A', // Dark Slide background
        textLight: 'F8FAFC',
        textMuted: '94A3B8'
      };

      // Add a slide helper with a clean dark theme
      function addCustomSlide(titleText) {
        let slide = pptx.addSlide();
        // Set dark background
        slide.background = { fill: colors.bgDark };
        
        // Add header orange line
        slide.addShape(pptx.ShapeType.rect, {
          x: 0, y: 0, w: '100%', h: 0.15, fill: { color: colors.orange }
        });

        // Add Header Title
        slide.addText(titleText, {
          x: 0.8, y: 0.6, w: 10, h: 0.8,
          fontSize: 32, fontFace: 'Trebuchet MS',
          bold: true, color: colors.orange
        });

        return slide;
      }

      // ----------------------------------------------------
      // SLIDE 1: Title Slide (Cover)
      // ----------------------------------------------------
      let s1 = pptx.addSlide();
      s1.background = { fill: colors.navy };
      
      // Top Orange Line
      s1.addShape(pptx.ShapeType.rect, {
        x: 0, y: 0, w: '100%', h: 0.25, fill: { color: colors.orange }
      });

      // App Name
      s1.addText("KARTAVYA", {
        x: 1.0, y: 2.2, w: 11.3, h: 1.2,
        fontSize: 64, fontFace: 'Trebuchet MS',
        bold: true, color: colors.orange,
        letterSpacing: 2
      });

      // Subtitle
      s1.addText("Next-Gen Smart Police Management System", {
        x: 1.0, y: 3.5, w: 11.3, h: 0.6,
        fontSize: 24, fontFace: 'Segoe UI',
        color: colors.textLight,
        italic: true
      });

      // Separation Line
      s1.addShape(pptx.ShapeType.line, {
        x: 1.0, y: 4.3, w: 6.0, h: 0,
        line: { color: colors.orange, width: 2 }
      });

      // Footer
      s1.addText("Project Development Journey & Feature Presentation", {
        x: 1.0, y: 4.8, w: 11.3, h: 0.5,
        fontSize: 14, fontFace: 'Segoe UI',
        color: '94A3B8'
      });


      // ----------------------------------------------------
      // SLIDE 2: UI/UX & Design Philosophy
      // ----------------------------------------------------
      let s2 = addCustomSlide("UI/UX & Design Philosophy");
      
      s2.addText("A modern, premium experience built for law enforcement.", {
        x: 0.8, y: 1.3, w: 10, h: 0.4,
        fontSize: 16, fontFace: 'Segoe UI', color: colors.textMuted, italic: true
      });

      // Point 1 Card
      s2.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 2.0, w: 5.2, h: 1.8, fill: { color: '1E293B' }, line: { color: '334155', width: 1 } });
      s2.addText("Glassmorphism & Aesthetics", { x: 1.1, y: 2.2, w: 4.6, h: 0.4, fontSize: 18, bold: true, color: colors.textLight });
      s2.addText("Semi-transparent frosted elements, glowing active borders, and responsive desktop/mobile components.", { x: 1.1, y: 2.7, w: 4.6, h: 0.9, fontSize: 13, color: colors.textMuted });

      // Point 2 Card
      s2.addShape(pptx.ShapeType.roundRect, { x: 6.5, y: 2.0, w: 5.2, h: 1.8, fill: { color: '1E293B' }, line: { color: '334155', width: 1 } });
      s2.addText("Premium Dark Mode", { x: 6.8, y: 2.2, w: 4.6, h: 0.4, fontSize: 18, bold: true, color: colors.textLight });
      s2.addText("Engineered with an ultra-clean deep dark palette (#001229) to reduce strain during night-shift operations.", { x: 6.8, y: 2.7, w: 4.6, h: 0.9, fontSize: 13, color: colors.textMuted });


      // ----------------------------------------------------
      // SLIDE 3: Role-Based Dashboards
      // ----------------------------------------------------
      let s3 = addCustomSlide("Role-Based Dashboard Integration");
      s3.addText("Different interface profiles customized automatically for various levels of force.", {
        x: 0.8, y: 1.3, w: 10, h: 0.4,
        fontSize: 16, fontFace: 'Segoe UI', color: colors.textMuted, italic: true
      });

      // Left: SHO Dashboard
      s3.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 2.0, w: 5.2, h: 3.2, fill: { color: '1E293B' }, line: { color: '334155', width: 1 } });
      s3.addText("SHO / Admin Dashboard", { x: 1.1, y: 2.2, w: 4.6, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s3.addText("• Full Station Strength overview\n• Daily Duty Roster & live status updates\n• Interactive pending leave approvals list\n• Add or modify force availability", {
        x: 1.1, y: 2.8, w: 4.6, h: 2.0, fontSize: 14, color: colors.textLight, lineSpacing: 26
      });

      // Right: Constable Dashboard
      s3.addShape(pptx.ShapeType.roundRect, { x: 6.5, y: 2.0, w: 5.2, h: 3.2, fill: { color: '1E293B' }, line: { color: '334155', width: 1 } });
      s3.addText("Constable / Officer Dashboard", { x: 6.8, y: 2.2, w: 4.6, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s3.addText("• Focused 'My Duty Schedule' view\n• Station status and resource summaries\n• Actionable buttons restricted (Approve/Reject actions hidden for security)\n• Easy profile checks", {
        x: 6.8, y: 2.8, w: 4.6, h: 2.0, fontSize: 14, color: colors.textLight, lineSpacing: 26
      });


      // ----------------------------------------------------
      // SLIDE 4: Interactive Duty Wizard
      // ----------------------------------------------------
      let s4 = addCustomSlide("Duty Management & Dynamic Wizard");
      s4.addText("Deploying forces is now a structured, dynamic 3-step process.", {
        x: 0.8, y: 1.3, w: 10, h: 0.4,
        fontSize: 16, fontFace: 'Segoe UI', color: colors.textMuted, italic: true
      });

      // Step 1
      s4.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 2.0, w: 3.6, h: 3.2, fill: { color: '1E293B' } });
      s4.addText("Step 1: Details", { x: 1.0, y: 2.2, w: 3.2, h: 0.4, fontSize: 16, bold: true, color: colors.orange });
      s4.addText("Input basic duty info, location, date, time, and severity category.", { x: 1.0, y: 2.8, w: 3.2, h: 2.0, fontSize: 13, color: colors.textLight });

      // Step 2
      s4.addShape(pptx.ShapeType.roundRect, { x: 4.7, y: 2.0, w: 3.6, h: 3.2, fill: { color: '1E293B' } });
      s4.addText("Step 2: AI Suggestion", { x: 4.9, y: 2.2, w: 3.2, h: 0.4, fontSize: 16, bold: true, color: colors.orange });
      s4.addText("Get intelligent recommendations for needed force strength and logistics based on the event scale.", { x: 4.9, y: 2.8, w: 3.2, h: 2.0, fontSize: 13, color: colors.textLight });

      // Step 3
      s4.addShape(pptx.ShapeType.roundRect, { x: 8.6, y: 2.0, w: 3.6, h: 3.2, fill: { color: '1E293B' } });
      s4.addText("Step 3: Assignments", { x: 8.8, y: 2.2, w: 3.2, h: 0.4, fontSize: 16, bold: true, color: colors.orange });
      s4.addText("Fully interactive inputs to select team leader, force count, and custom numbers of vehicles and specialized gears dynamically.", { x: 8.8, y: 2.8, w: 3.2, h: 2.0, fontSize: 13, color: colors.textLight });


      // ----------------------------------------------------
      // SLIDE 5: Excel Bulk Upload
      // ----------------------------------------------------
      let s5 = addCustomSlide("Officer Management & Excel Upload");
      s5.addText("Managing police strength made easy with real-time checks.", {
        x: 0.8, y: 1.3, w: 10, h: 0.4,
        fontSize: 16, fontFace: 'Segoe UI', color: colors.textMuted, italic: true
      });

      s5.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 2.0, w: 10.9, h: 3.2, fill: { color: '1E293B' }, line: { color: '334155', width: 1 } });
      
      s5.addText("Bulk Import Features & Validation Rules", { x: 1.2, y: 2.2, w: 10, h: 0.4, fontSize: 20, bold: true, color: colors.orange });
      
      s5.addText("• Excel Format Support: Upload spreadsheet containing Name, Rank, PNO/Belt ID, and Mobile.\n" +
                "• PNO Validation: Automatic checks to ensure PNO numbers are unique and prevent duplicate entries.\n" +
                "• Live Feedback: Error preview lists specific rows that fail validation (e.g. missing values or formats).\n" +
                "• Interactive Roster: Instantly filter active strength by Available, On Leave, or On Duty statuses.", {
        x: 1.2, y: 2.8, w: 10, h: 2.0, fontSize: 15, color: colors.textLight, lineSpacing: 30
      });


      // ----------------------------------------------------
      // SLIDE 6: Branding & Localization
      // ----------------------------------------------------
      let s6 = addCustomSlide("Identity: KARTAVYA");
      s6.addText("Evolving the system to match official state police standards.", {
        x: 0.8, y: 1.3, w: 10, h: 0.4,
        fontSize: 16, fontFace: 'Segoe UI', color: colors.textMuted, italic: true
      });

      // Left
      s6.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 2.0, w: 5.2, h: 3.2, fill: { color: '1E293B' } });
      s6.addText("Rebranding from PNO", { x: 1.1, y: 2.2, w: 4.6, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s6.addText("Migrated all generic application references from 'PNO' (Police Network Office) to the custom-branded 'KARTAVYA' title to emphasize duty and dedication.", { x: 1.1, y: 2.8, w: 4.6, h: 2.0, fontSize: 14, color: colors.textLight, lineSpacing: 24 });

      // Right
      s6.addShape(pptx.ShapeType.roundRect, { x: 6.5, y: 2.0, w: 5.2, h: 3.2, fill: { color: '1E293B' } });
      s6.addText("Uttar Pradesh Police Styling", { x: 6.8, y: 2.2, w: 4.6, h: 0.4, fontSize: 18, bold: true, color: colors.orange });
      s6.addText("Integrated localization hooks (i18n) for future Hindi translation and customized login layouts with the official UP Police gradient styling (#FF9933 and #002147).", { x: 6.8, y: 2.8, w: 4.6, h: 2.0, fontSize: 14, color: colors.textLight, lineSpacing: 24 });


      // ----------------------------------------------------
      // SLIDE 7: DevOps & Automation
      // ----------------------------------------------------
      let s7 = addCustomSlide("DevOps & Automated Deployment");
      s7.addText("Ensuring maximum uptime and continuous integration.", {
        x: 0.8, y: 1.3, w: 10, h: 0.4,
        fontSize: 16, fontFace: 'Segoe UI', color: colors.textMuted, italic: true
      });

      // Icon placeholder / graphic block
      s7.addShape(pptx.ShapeType.roundRect, { x: 0.8, y: 2.0, w: 4.0, h: 3.2, fill: { color: '1E293B' }, line: { color: colors.orange, width: 2 } });
      s7.addText("CI/CD PIPELINE", { x: 1.0, y: 3.2, w: 3.6, h: 0.8, fontSize: 24, bold: true, color: colors.orange, align: 'center' });

      // Text block
      s7.addText("• Strict TypeScript Checks: Prevents deployment of buggy files and runtime syntax exceptions.\n" +
                "• GitHub Actions Integration: Triggers build on push to 'main' branch automatically.\n" +
                "• GitHub Pages Auto-Deploy: Pushes compiled Vite production bundles directly to live servers.\n" +
                "• Global Reach: Immediate update propagation to all field tablets and monitors.", {
        x: 5.2, y: 2.0, w: 6.5, h: 3.2, fontSize: 14, color: colors.textLight, lineSpacing: 28
      });

      // Save Presentation
      pptx.writeFile({ fileName: 'KARTAVYA_Project_Presentation.pptx' })
        .then(() => {
          document.getElementById('status').style.display = 'block';
        })
        .catch(err => {
          alert('Error generating PPTX: ' + err);
        });
    }
  </script>
</body>
</html>
